<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de Transferencia | Child's Play</title>
    <style>
        /* Estilos generales del cuerpo */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #222222;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal con la imagen */
        .contenedor-chucky {
            position: relative;
            width: 100%;
            max-width: 800px; 
            aspect-ratio: 1 / 1; 
            background-image: url('./Image.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Área virtual que representa la pantalla de la tablet */
        .pantalla-tablet {
            position: absolute;
            top: 60%; 
            left: 20%; 
            width: 60%; 
            height: 33%; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 2%; 
        }

        /* Adaptación de la tarjeta bancaria (Contenedor Flex centralizado) */
        .tarjeta-bancaria {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center; 
            text-align: center;
        }

        /* Tipografía fluida con clamp */
        .titulo {
            color: rgba(0,0,0, 0.9);
            font-size: clamp(0.7rem, 2.5vw, 1.3rem);
            margin: 0;
            font-weight: bold;
        }

        .dato-fila {
            width: 100%;
        }

        .etiqueta {
            font-size: clamp(0.55rem, 1.8vw, 1rem);
            display: block;
            margin: 0;
            color: #222;
        }

        .etiqueta_CLABE {
            font-size: clamp(0.55rem, 1.8vw, 1rem);            
            display: block;
            margin-bottom: 2px;
            color: #222;
            font-weight: 600;
        }

        /* Contenedor del valor CLABE adaptado al contenido */
        .valor {
            font-size: clamp(0.65rem, 2vw, 1.1rem);
            font-weight: bold;
            color: #1a1a1a;
            letter-spacing: 1.5px;
            background-color: rgba(202, 51, 35, 0.8);
            width: fit-content; /* Se abraza al contenido */
            padding: 4px 15px; /* Margen interno estricto */
            margin: 0 auto; /* Centrado automático */
            border-radius: 4px;
            display: block;
        }

        /* Botón interactivo adaptado al contenido */
        .boton-copiar {
            background-color: rgb(119, 229, 235);
            border: none;            
            width: fit-content; /* Se abraza al texto */
            height: clamp(25px, 6vw, 35px); 
            padding: 0 20px; /* Proporciona un área de clic cómoda horizontalmente */
            font-size: clamp(0.6rem, 2vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.3s ease;
            margin: 0 auto; /* Centrado automático */
        }

        .boton-copiar:hover {
            background-color: rgb(215, 108, 36);
        }

        .copiado-exito {
            background-color: #28a745 !important;
            color: white;
        }
    </style>
</head>
<body>

    <div class="contenedor-chucky">
        <div class="pantalla-tablet">
            <div class="tarjeta-bancaria">
                <h2 class="titulo">Datos para Transferencia Bancaria</h2>
                
                <div class="dato-fila">
                    <span class="etiqueta">Beneficiario: Iridian Anahí Nava Peña</span>
                </div>
                
                <div class="dato-fila">
                    <span class="etiqueta">Institución: BBVA</span>
                </div>

                <div class="dato-fila">
                    <span class="etiqueta_CLABE">Cuenta CLABE</span>
                    <span class="valor" id="clabeBancaria">012180015874228542</span>
                </div>

                <button class="boton-copiar" id="btnCopiar" onclick="copiarAlPortapapeles()" aria-label="Copiar CLABE">Copiar CLABE</button>
            </div>
        </div>
    </div>

    <script>
        function copiarAlPortapapeles() {
            const textoClabe = document.getElementById('clabeBancaria').innerText;
            const boton = document.getElementById('btnCopiar');
            
            navigator.clipboard.writeText(textoClabe).then(() => {
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Copiado!";
                boton.classList.add("copiado-exito");

                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("copiado-exito");
                }, 2000)

            }).catch(err => {
                console.error("Error al copiar al portapapeles: ", err);
                alert("No se pudo copiar el texto. Por favor, selecciónelo manualmente.");
            });
        }   
    </script>
</body>
</html>
